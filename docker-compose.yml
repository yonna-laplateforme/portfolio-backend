services:
  mabase:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ton_mot_de_passe_secu
      MYSQL_DATABASE: portfolio_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql 
      - ./db:/docker-entrypoint-initdb.d

  api:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - mabase
    environment:
      - PORT=3001
      - DB_HOST=mabase
      - DB_USER=root
      - DB_PASSWORD=ton_mot_de_passe_secu
      - DB_NAME=portfolio_db
      - DB_PORT=3306
    volumes:
      - ./uploads_sauvegarde:/app/public/uploads

volumes:
  db_data: 